<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-purple-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8">
        <div id="errormessages" th:if="${errorMessage}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-5 rounded-r-lg shadow-lg mb-6" th:text="${errorMessage}"></div>
        <form id="crear_tasca" th:action="@{/tasques}" method="post" class="bg-white p-8 rounded-2xl shadow-2xl max-w-2xl mx-auto border border-purple-100">
            <h1 class="text-purple-600 text-center text-3xl font-bold mb-8">Gestor de Tasques</h1>
            <label for="descripcio" class="block mb-3 text-gray-700 font-semibold">Introdueix una descripció per la tasca:</label>
            <input type="text" id="descripcio" name="descripcio" class="w-full p-3 border-2 border-purple-200 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all">
            <button type="submit" class="w-full bg-purple-500 text-white border-none p-3 rounded-lg cursor-pointer hover:bg-purple-600 mt-6 font-semibold shadow-lg hover:shadow-xl transition-all">Crear Tasca</button>
            <a th:href="@{/tasques}" class="block text-purple-600 text-center mt-6 hover:text-purple-800 font-semibold transition-colors">Veure Tasques</a>
        </form>
    </div>
</body>
</html>
