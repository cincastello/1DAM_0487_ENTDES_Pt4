<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Editar Tasca</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-purple-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8">
        <div id="errormessages" th:if="${errorMessage}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-5 rounded-r-lg shadow-lg mb-6" th:text="${errorMessage}"></div>
        <form id="edit_tasca" th:action="@{/tasques/update/{id}(id=${tasca.id})}" th:object="${tasca}" method="post" class="bg-white p-8 rounded-2xl shadow-2xl max-w-2xl mx-auto border border-purple-100">
            <h1 class="text-purple-600 text-center text-3xl font-bold mb-8">Editar Tasca</h1>

            <div class="mb-6">
            <label for="descripcio" class="block text-gray-700 font-semibold mb-2">Descripció:</label>
            <input type="text" id="descripcio" th:field="*{descripcio}" class="w-full p-3 border-2 border-purple-200 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all" />
            </div>
            <div class="mb-6 flex items-center bg-purple-50 p-4 rounded-lg">
            <input type="checkbox" id="completada" th:field="*{completada}" class="w-5 h-5 text-purple-600 border-gray-300 rounded focus:ring-purple-500" />
            <label for="completada" class="ml-3 text-gray-700 font-semibold">Marcar com a completada</label>
            </div>
            <div class="flex items-center justify-between gap-4">
            <button type="submit" class="flex-1 bg-purple-500 text-white px-6 py-3 rounded-lg hover:bg-purple-600 font-semibold shadow-lg hover:shadow-xl transition-all">Guardar</button>
            <a th:href="@{/tasques}" class="flex-1 text-center bg-gray-200 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-300 font-semibold transition-all">Cancel·lar</a>
            </div>
        </form>
    </div>
</body>
</html>
