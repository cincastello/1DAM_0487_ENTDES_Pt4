<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Llista de Tasques</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-purple-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-purple-600 text-center text-4xl font-bold mb-4">Llista de Tasques</h1>
        <div id="errormessages" th:if="${errorMessage}"
            class="bg-red-50 border-l-4 border-red-500 text-red-700 p-5 rounded-r-lg shadow-lg mb-6" th:text="${errorMessage}"></div>

        <section class="bg-white rounded-2xl shadow-2xl p-6 border border-purple-100">
            <div class="sm:flex sm:items-center sm:justify-between mb-6">
                <div>
                    <div class="flex items-center gap-x-3">
                        <h2 class="text-lg font-semibold text-gray-700">Nombre total de tasques: </h2>
                        <span th:text="${nombreTasques}" class="px-4 py-2 text-purple-700 bg-purple-100 rounded-full font-bold shadow-md">240</span>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <form th:action="@{/tasques}" method="get">
                    <div class="flex items-center gap-3">
                        <label for="filtreDescripcio" class="text-gray-700 font-semibold">Filtrar per descripció:</label>
                        <input type="text" id="filtreDescripcio" name="filtreDescripcio" placeholder="Cerca..."
                            class="flex-1 p-3 border-2 border-purple-200 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all">
                        <button type="submit"
                            class="bg-purple-500 text-white px-6 py-3 rounded-lg hover:bg-purple-600 font-semibold shadow-lg hover:shadow-xl transition-all">
                            Filtrar</button>
                    </div>
                </form>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-purple-200">
                    <thead class="bg-purple-100">
                        <tr>
                            <th scope="col" class="py-4 px-6 font-semibold text-left text-purple-800">
                                Descripció
                            </th>
                            <th scope="col" class="px-6 py-4 font-semibold text-left text-purple-800">
                                Estat
                            </th>
                            <th scope="col" class="px-6 py-4 font-semibold text-left text-purple-800">
                                Accions
                            </th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="tasca : ${tasques}" class="hover:bg-purple-50 transition-colors">
                            <td class="px-6 py-4 text-sm font-medium whitespace-nowrap">
                                <div>
                                    <h2 th:text="${tasca.descripcio}" class="font-semibold text-gray-800"></h2>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm font-medium whitespace-nowrap">
                                <div th:text="${tasca.completada ? 'Completada' : 'Pendent'}"
                                    class="inline px-4 py-2 text-sm font-semibold rounded-full shadow-md"
                                    th:classappend="${tasca.completada ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                                </div>
                            </td>
                            <td class="px-6 py-4 text-sm whitespace-nowrap">
                                <div class="flex space-x-2">
                                    <form th:action="@{/tasques/update/{id}/completar(id=${tasca.id})}"
                                        method="post">
                                        <button type="submit"
                                            class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 shadow-md hover:shadow-lg transition-all font-semibold">
                                            Completar
                                        </button>
                                    </form>
                                    <form th:action="@{/tasques/delete/{id}(id=${tasca.id})}" method="post">
                                        <button type="submit"
                                            class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 shadow-md hover:shadow-lg transition-all font-semibold">
                                            Eliminar</button>
                                    </form>
                                    <form th:action="@{/tasques/edit/{id}(id=${tasca.id})}" method="get">
                                        <button type="submit"
                                            class="bg-amber-500 text-white px-4 py-2 rounded-lg hover:bg-amber-600 shadow-md hover:shadow-lg transition-all font-semibold">
                                            Editar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div class="mt-8 text-center">
            <a th:href="@{/}" class="inline-block bg-white text-purple-600 px-6 py-3 rounded-lg hover:bg-purple-50 font-semibold shadow-lg hover:shadow-xl transition-all border-2 border-purple-200">
                Tornar a l'inici</a>
        </div>
    </div>
</body>

</html>

</body>
